<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern Design</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            transition: background-color 0.3s, color 0.3s;
        }
        .dark-mode {
            background-color: #121212;
            color: #ffffff;
        }
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1rem;
            background-color: #007bff;
            color: white;
        }
        .toggle {
            cursor: pointer;
        }
        main {
            padding: 2rem;
        }
        .products {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 1rem;
        }
        .product {
            border: 1px solid #ccc;
            padding: 1rem;
            position: relative;
        }
        .badge {
            position: absolute;
            top: 10px;
            left: 10px;
            background-color: red;
            color: white;
            padding: 0.5rem;
            border-radius: 5px;
        }
        input[type="text"] {
            padding: 0.5rem;
            margin: 1rem 0;
            width: 100%;
        }
    </style>
</head>
<body>
    <header>
        <h1>My Online Store</h1>
        <div class="toggle" onclick="toggleDarkMode()">Toggle Dark Mode</div>
    </header>
    <main>
        <input type="text" placeholder="Search products..." id="search" onkeyup="filterProducts()">
        <div class="products" id="product-list">
            <div class="product"><div class="badge">New</div>Product 1</div>
            <div class="product"><div class="badge">Bestselling</div>Product 2</div>
            <div class="product">Product 3</div>
            <div class="product">Product 4</div>
        </div>
    </main>
    <script>
        function toggleDarkMode() {
            document.body.classList.toggle('dark-mode');
        }
        function filterProducts() {
            const searchInput = document.getElementById('search').value.toLowerCase();
            const products = document.getElementsByClassName('product');
            Array.from(products).forEach(product => {
                if (product.textContent.toLowerCase().includes(searchInput)) {
                    product.style.display = '';
                } else {
                    product.style.display = 'none';
                }
            });
        }
    </script>
</body>
</html>
