<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Enhanced Store</title>
    <link rel="stylesheet" href="styles.css">
    <script src="script.js" defer></script>
</head>
<body>
    <header>
        <h1>Welcome to Our Enhanced Store</h1>
        <input type="text" id="searchBar" placeholder="Search products...">
        <div class="category-filters">
            <button class="filter-btn">All</button>
            <button class="filter-btn">Digital</button>
            <button class="filter-btn">Physical</button>
        </div>
    </header>
    <main>
        <section class="products">
            <div class="product" id="product1">
                <h2>Product Title 1</h2>
                <p>Description for product 1.</p>
            </div>
            <div class="product" id="product2">
                <h2>Product Title 2</h2>
                <p>Description for product 2.</p>
            </div>
            <!-- More products can be added here -->
        </section>
    </main>
    <section class="testimonials">
        <h2>Customer Testimonials</h2>
        <div class="testimonial">
            <p>"Great products! Highly recommend!" - Customer A</p>
        </div>
        <div class="testimonial">
            <p>"Amazing service and fast delivery!" - Customer B</p>
        </div>
    </section>
    <footer>
        <p>Follow us on:</p>
        <a href="#">Facebook</a> | <a href="#">Twitter</a> | <a href="#">Instagram</a>
    </footer>
    <script>
        // Local storage implementation for cart persistence
        const cart = [];
        function saveToLocalStorage() {
            localStorage.setItem('cart', JSON.stringify(cart));
        }
    </script>
</body>
</html>
